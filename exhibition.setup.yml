site:
  title: "온화: 溫和"
  description: 필링이들의 네번째 이야기
  dates: 2026.03.27 - 2026.03.29
  venue: 레온갤러리 구의
  tagline: 필링이들의 네번째 이야기
  poster_image: /assets/exhibition/exhibition-4th.png
  hero_alt: Filter 4th Exhibition poster

content:
  exhibition_markdown: |
      우리는 쉽게 지나치는 순간들 속에서도 오래 남는 감정이 있다고 믿습니다.
      필터의 네 번째 전시는 각자가 발견한 빛, 온도, 거리, 마음의 결을 사진으로 엮어낸 자리입니다.
      사진 속 장면들은 특별한 사건이 아니라, 어쩌면 누구에게나 있었을 법한 평범한 하루의 한 조각일지도 모릅니다.
      그러나 그 조각들은 누군가의 시선을 거치며 다시 한 번 선명해지고, 보는 이의 기억 속에서도 새로운 의미로 머뭅니다.
      이 전시가 당신에게도 조용히 오래 남는 한 장면이 되기를 바랍니다.
